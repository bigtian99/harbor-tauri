name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload to, for example v1.0. Leave empty to use package.json version.'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            label: 'macOS ARM64'
            ops: false
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            label: 'macOS x64'
            ops: false
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            label: 'Linux x64'
            ops: false
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            label: 'Windows x64'
            ops: false
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            label: 'macOS ARM64 OPS'
            ops: true
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            label: 'Windows x64 OPS'
            ops: true

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend dependencies
        # 偶发 ERR_PNPM_BAD_PACKAGE_JSON：某个 package.json 被写成空文件（pnpm 在 GHA 上的已知写入竞态，
        # 见 pnpm/pnpm#6627）。frozen-lockfile 让失败更快更可预测；失败时清空残留后重试一次即可恢复。
        # 显式 shell: bash —— Windows runner 默认是 PowerShell，不认 bash 的 || ( ... ) 子 shell，
        # 会被当作 PowerShell 语法解析而报 Missing closing ')'。三平台 runner 均预装 bash。
        shell: bash
        run: |
          pnpm install --frozen-lockfile || (
            echo "::warning::首次 pnpm install 失败，清理 node_modules 与 store 缓存后重试"
            rm -rf node_modules
            pnpm store prune || true
            pnpm install --frozen-lockfile
          )

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPS_MODE: ${{ matrix.ops && 'true' || '' }}
        with:
          tauriScript: pnpm exec tauri
          args: --target ${{ matrix.target }} ${{ matrix.platform == 'windows-latest' && '--bundles nsis' || '' }}

      # OPS / 非 OPS 会产出同名 dmg/exe，不改名会在 release 上传时撞名 →
      # softprops 调 update-a-release-asset 404（Not Found）
      - name: Collect unique-named assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          suffix="${{ matrix.ops && 'ops' || 'std' }}"
          # 只收安装包，不收 .app 目录（体积大且无法当 release asset 下载用）
          while IFS= read -r -d '' f; do
            base="$(basename "$f")"
            ext="${base##*.}"
            name="${base%.*}"
            # 已含 ops 标记则不再重复加
            if [[ "$suffix" == "ops" && "$base" != *ops* && "$base" != *OPS* ]]; then
              out="${name}-ops.${ext}"
            else
              out="$base"
            fi
            # 仍冲突则加 target 后缀
            if [[ -e "release-assets/$out" ]]; then
              out="${name}-${{ matrix.target }}.${ext}"
            fi
            echo "pack: $f -> release-assets/$out"
            cp "$f" "release-assets/$out"
          done < <(find "src-tauri/target/${{ matrix.target }}/release/bundle" \
            \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.nsis.zip' \) \
            -type f -print0 2>/dev/null || true)

          echo "---- release-assets ----"
          ls -la release-assets || true
          if ! find release-assets -type f -print -quit | grep -q .; then
            echo "::error::No installers found under bundle for ${{ matrix.label }}"
            find "src-tauri/target/${{ matrix.target }}/release/bundle" -type f 2>/dev/null | head -50 || true
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.label }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve release tag
        id: release_tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_RELEASE_TAG" ]]; then
            tag="$INPUT_RELEASE_TAG"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            version="$(node -p "require('./package.json').version")"
            tag="v${version}"
          else
            tag="$REF_NAME"
          fi

          if [[ "$tag" != v* ]]; then
            echo "::error::Release tag must start with v, got: $tag"
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare asset list
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upload
          # 扁平化 + 去重文件名（后写覆盖前写并告警）
          find artifacts -type f | sort | while read -r f; do
            base="$(basename "$f")"
            if [[ -e "upload/$base" ]]; then
              echo "::warning::duplicate asset name $base — renaming with parent dir"
              parent="$(basename "$(dirname "$f")")"
              base="${parent}-${base}"
            fi
            cp "$f" "upload/$base"
          done

          echo "---- files to upload ----"
          ls -la upload
          count="$(find upload -type f | wc -l | tr -d ' ')"
          if [[ "$count" -eq 0 ]]; then
            echo "::error::No build artifacts were downloaded for the release"
            exit 1
          fi
          echo "count=$count" >> "$GITHUB_OUTPUT"

      # 不用 softprops：同名 asset 会打 update-a-release-asset 且 404
      # 改用 gh：先确保 Release 存在，再 --clobber 上传
      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — will upload/clobber assets"
            # 若是 draft，发布成正式
            gh release edit "$TAG" --draft=false --prerelease=false --latest 2>/dev/null || \
              gh release edit "$TAG" --draft=false --prerelease=false || true
          else
            echo "Creating release $TAG"
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --latest \
              --verify-tag
          fi

          # 上传全部安装包；--clobber 覆盖同名，避免 update asset 404
          shopt -s nullglob
          files=(upload/*)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::upload/ is empty"
            exit 1
          fi
          gh release upload "$TAG" "${files[@]}" --clobber

          echo "---- release assets ----"
          gh release view "$TAG" --json tagName,isDraft,isLatest,assets \
            --jq '{tag:.tagName, draft:.isDraft, latest:.isLatest, assets:[.assets[].name]}'
