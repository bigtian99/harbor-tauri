name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload to, for example v1.0. Leave empty to use package.json version.'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-14'
            target: 'aarch64-apple-darwin'
            label: 'macOS ARM64'
            ops: false
          - platform: 'macos-13'
            target: 'x86_64-apple-darwin'
            label: 'macOS x64'
            ops: false
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            label: 'Linux x64'
            ops: false
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            label: 'Windows x64'
            ops: false
          - platform: 'macos-14'
            target: 'aarch64-apple-darwin'
            label: 'macOS ARM64 OPS'
            ops: true
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            label: 'Windows x64 OPS'
            ops: true

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPS_MODE: ${{ matrix.ops && 'true' || '' }}
        with:
          tauriScript: pnpm exec tauri
          args: --target ${{ matrix.target }} ${{ matrix.platform == 'windows-latest' && '--bundles nsis' || '' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve release tag
        id: release_tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_RELEASE_TAG" ]]; then
            tag="$INPUT_RELEASE_TAG"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            version="$(node -p "require('./package.json').version")"
            tag="v${version}"
          else
            tag="$REF_NAME"
          fi

          if [[ "$tag" != v* ]]; then
            echo "::error::Release tag must start with v, got: $tag"
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        shell: bash
        run: |
          if ! find artifacts -type f -print -quit | grep -q .; then
            echo "::error::No build artifacts were downloaded for the release"
            exit 1
          fi

          find artifacts -type f -print | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
