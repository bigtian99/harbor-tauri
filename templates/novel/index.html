<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>笔书阁</title>
  <meta name="description" content="笔书阁" />
  <style>
    @font-face {
      font-family: "zihunjisuzhuijiti_T-Regular";
      src: url("./font/zihunjisuzhuijiti_T-Regular.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #f5f6fa;
      --text: #1f2328;
      --primary: #2563eb;
      --card: #ffffff;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      min-width: 1200px;
    }
    .container {
      container-type: inline-size;
      width: 100%;
    }
    .header {
        width: 100%;
        height: 90px;
        background: #111111;
        border-radius: 0px 0px 0px 0px;
    }
    .header-title {
        font-size: 24px;
        color: #ffffff;
        font-weight: 600;
        line-height: 90px;
        text-align: center;
        margin-left: 50px;
    }
    .content {
        position: relative;
        isolation: isolate;
        width: 100%;
        max-width: 100%;
        min-width: 0;
        min-height: calc(100vw * 854 / 1920);
        min-height: calc(100cqw * 854 / 1920);
        display: flex;
        justify-content: space-around;
        align-items: flex-start;
    }
    .content::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        background-color: #1D1C1F;
        background-image: url("./image/anime7.png");
        background-repeat: no-repeat;
        background-position: center;
        background-size: 100% 100%;
        pointer-events: none;
    }
    .content > * {
        position: relative;
        z-index: 1;
    }
    .content .item {
        width: 30%;
        text-align: center;
    }
    .content .item img {
        width: 100%;
        height: auto;
        display: block;
    }
    .content .item .icon {
        width: 160px;
        height: 160px;
        background-image: url('./image/logo.png');
        border-radius: 36px 36px 36px 36px;
        margin: 0 auto;
        margin-top: 20px;
        background-size: cover;
        background-position: center;
    }
    .content .item .item-title {
        font-size: 24px;
        color: #ffffff;
        font-weight: 600;
        line-height: 30px;
        text-align: center;
        margin-top: 20px;
    }
    .content .item .item-content {
        font-size: 16px;
        color: #ffffff;
        font-weight: 400;
        line-height: 30px;
        text-align: center;
    }
    .content .item .item-button {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        flex-wrap: nowrap;
        margin-top: 16px;
        margin-bottom: 20px;
    }
    .content .item .item-button a {
        display: inline-block;
        flex: 0 0 auto;
    }
    .content .item .item-button img {
        width: 160px;
        height: auto;
        display: block;
    }
    /* 二维码样式 */
    .qr-section {
      margin-top: 8px;
      margin-bottom: 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .qr-code {
      background: #ffffff;
      padding: 8px;
      border-radius: 20px;
      display: inline-flex;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    .qr-code canvas {
      display: block;
      width: 120px;
      height: 120px;
      border-radius: 12px;
    }
    .qr-tip {
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      padding: 4px 12px;
      border-radius: 60px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }
    .product-intro {
        width: 100%;
        background: #1D1C1F;
        border-radius: 0px 0px 0px 0px;
        color: #ffffff;
        text-align: center;
    }
    .product-intro-title {
        padding-top: 50px;
        padding-bottom: 50px;
    }
    .product-intro-title-text {
        font-size: 40px;
        color: #ffffff;
        font-weight: 600;
        line-height: 50px;
    }
    .product-intro-title-content {
        font-size: 18px;
        color: #ffffff;
        font-weight: 100;
        line-height: 30px;
        margin-top: 10px;
    }
    .product-intro-title-image {
        width: 60%;
        max-width: 100%;
        border-radius: 0px 0px 0px 0px;
        margin: 0 auto;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: clamp(16px, 3vw, 48px);
    }
    .product-intro-title-image-img {
        flex: 0 1 50%;
        max-width: 50%;
        width: 100%;
        height: auto;
        display: block;
        object-fit: contain;
    }
    .product-intro-title-image-text {
        flex: 1 1 50%;
        min-width: 0;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: 20px;
        text-align: left;
        color: #ffffff;
        line-height: 1.4;
    }
    .product-intro-title-image-item {
        display: grid;
        grid-template-columns: auto 1fr;
        grid-template-rows: auto auto;
        column-gap: 14px;
        row-gap: 6px;
        width: 100%;
        align-items: start;
        background-color: rgba(54, 53, 56, 0.5);
        padding: 10px;
        border-radius: 5px;
    }
    .product-intro-title-image-index {
        grid-column: 1;
        grid-row: 1 / -1;
        align-self: center;
        justify-self: center;
        display: inline-block;
        color: #FE3F7A;
        font-size: 36px;
        font-weight: 700;
        line-height: 1;
        font-family: "zihunjisuzhuijiti_T-Regular", ui-sans-serif, sans-serif;
        transform: skewX(-10deg);
    }
    .product-intro-title-image-title {
        grid-column: 2;
        grid-row: 1;
        font-size: 22px;
        font-weight: 600;
        color: #ffffff;
        line-height: 1.35;
        min-width: 0;
    }
    .product-intro-title-image-desc {
        grid-column: 2;
        grid-row: 2;
        font-size: 14px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.88);
        line-height: 1.5;
        min-width: 0;
    }
    .product-carousel {
        width: 100%;
        background: #1D1C1F;
        border-radius: 0px 0px 0px 0px;
        color: #ffffff;
        text-align: center;
    }
    .product-carousel-title {
        padding-top: 50px;
        padding-bottom: 50px;
    }
    .product-carousel-title-text {
        font-size: 40px;
        color: #ffffff;
        font-weight: 600;
        line-height: 50px;
    }
    .product-carousel-title-content {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 12px 16px;
        margin-top: 16px;
        font-size: 14px;
        color: #ffffff;
        font-weight: 400;
        line-height: 1.3;
    }
    .product-carousel-title-content span {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 5px 14px;
        border: 1px solid #f6f6f6;
        border-radius: 60px;
    }
    .product-carousel-marquee {
        width: 100%;
        overflow: hidden;
        padding: 8px 0 40px;
    }
    .product-carousel-marquee__row {
        overflow: hidden;
        width: 100%;
    }
    .product-carousel-marquee__row + .product-carousel-marquee__row {
        margin-top: 12px;
    }
    .product-carousel-marquee__track {
        display: flex;
        width: max-content;
        will-change: transform;
    }
    .product-carousel-marquee__row--ltr .product-carousel-marquee__track {
        animation: product-carousel-marquee-ltr 55s linear infinite;
    }
    @keyframes product-carousel-marquee-ltr {
        from { transform: translateX(-50%); }
        to { transform: translateX(0); }
    }
    .product-carousel-marquee__group {
        display: flex;
        flex: 0 0 auto;
        align-items: stretch;
        gap: 10px;
        padding-right: 10px;
    }
    .product-carousel-marquee__group img {
        flex: 0 0 auto;
        width: min(200px, 12.25vw);
        object-fit: cover;
        object-position: center;
        display: block;
        border-radius: 6px;
    }
    @media (prefers-reduced-motion: reduce) {
        .product-carousel-marquee__row--ltr .product-carousel-marquee__track {
            animation: none;
        }
    }
    @media (max-width: 768px) {
        body { min-width: 0; }
        .header { height: 56px; }
        .header-title {
            margin-left: 0;
            line-height: 56px;
            font-size: 18px;
        }
        .content {
            min-height: auto;
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
        }
        .content::before {
            background-size: cover;
            background-position: center;
        }
        .content .item {
            width: 100%;
        }
        .content .item .icon {
            width: 100px;
            height: 100px;
            border-radius: 22px;
            margin-top: 0;
        }
        .content .item .item-title {
            margin-top: 12px;
            font-size: 20px;
            line-height: 1.3;
        }
        .content .item .item-content {
            margin-top: 8px;
            font-size: 14px;
            line-height: 1.6;
        }
        .content .item .item-button {
            margin-top: 14px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .content .item .item-button img {
            width: 132px;
        }
        .qr-code canvas {
          width: 100px;
          height: 100px;
        }
        .qr-tip {
          font-size: 11px;
        }
        .product-intro-title {
            padding: 32px 16px;
        }
        .product-intro-title-text {
            font-size: 28px;
            line-height: 1.25;
        }
        .product-intro-title-content {
            margin-top: 8px;
            font-size: 14px;
            line-height: 1.6;
        }
        .product-intro-title-image {
            width: 100%;
            margin-top: 16px;
            flex-direction: column;
            gap: 16px;
        }
        .product-intro-title-image-img {
            max-width: 100%;
        }
        .product-intro-title-image-text {
            width: 100%;
            gap: 12px;
        }
        .product-intro-title-image-item {
            padding: 10px 12px;
            column-gap: 10px;
        }
        .product-intro-title-image-index {
            font-size: 28px;
        }
        .product-intro-title-image-title {
            font-size: 17px;
        }
        .product-intro-title-image-desc {
            font-size: 13px;
        }
        .product-carousel-title {
            padding: 32px 16px 24px;
        }
        .product-carousel-title-text {
            font-size: 28px;
            line-height: 1.25;
        }
        .product-carousel-title-content {
            gap: 10px;
            font-size: 13px;
        }
        .product-carousel-title-content span {
            padding: 4px 12px;
        }
        .product-carousel-marquee {
            padding: 8px 0 24px;
        }
        .product-carousel-marquee__row--ltr .product-carousel-marquee__track {
            animation-duration: 36s;
        }
        .product-carousel-marquee__group {
            gap: 8px;
            padding-right: 8px;
        }
        .product-carousel-marquee__group img {
            width: 30vw;
            min-width: 104px;
            max-width: 132px;
            border-radius: 4px;
        }
    }
  </style>

      if (androidBtn) {

      if (container) {
        var canvas = document.createElement("canvas");
        canvas.width = 120;
        canvas.height = 120;
        container.appendChild(canvas);

        var script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js";
        script.onload = function() {
          QRCode.toCanvas(canvas, androidDownloadUrl, {
            width: 120,
            margin: 1
          }, function(err) {
            if (err) console.error(err);

        };
        document.head.appendChild(script);
