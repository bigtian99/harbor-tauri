<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="template-category" content="漫画" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>{{NAME}} - 官方下载</title>
  <meta name="description" content="{{NAME}} - 海量高清漫画，每日更新，沉浸式阅读体验。" />
  <style>
    /* ==================== 设计 token ==================== */
    :root {
      --ink: #0c0a14;
      --purple: #a78bfa;
      --purple-bright: #c084fc;
      --paper: #f5f3ec;
      --text: #f3f0ff;
      --text-mute: rgba(243, 240, 255, 0.7);
      --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--ink);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ==================== 封面墙视差背景 ==================== */
    .cover-wall {
      position: fixed;
      inset: -10%;
      z-index: 0;
      pointer-events: none;
    }

    .cover-layer {
      position: absolute;
      inset: 0;
      display: grid;
      gap: 8px;
      padding: 8px;
      will-change: transform;
      transition: transform 0.45s var(--ease);
    }

    .cover-layer--far  { grid-template-columns: repeat(6, 1fr); grid-auto-rows: 150px; opacity: 0.32; filter: blur(3px); }
    .cover-layer--mid  { grid-template-columns: repeat(5, 1fr); grid-auto-rows: 175px; opacity: 0.6; filter: blur(0.5px); }
    .cover-layer--near { grid-template-columns: repeat(4, 1fr); grid-auto-rows: 200px; opacity: 0.9; }

    .tile {
      width: 100%;
      height: 100%;
      border-radius: 8px;
      background-size: cover;
      background-position: center;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
    }

    /* 顶部+底部暗压，中部留出主体光晕 */
    .scrim {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 50% 38%, rgba(12, 10, 20, 0.35) 0%, rgba(12, 10, 20, 0.78) 70%),
        linear-gradient(180deg, rgba(12, 10, 20, 0.7) 0%, transparent 18%, transparent 82%, rgba(12, 10, 20, 0.8) 100%);
    }

    /* ==================== 主体容器 ==================== */
    .wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 7vh 18px 0;
    }

    /* ==================== 顶栏：拟声词 + 分镜框 logo+名称 ==================== */
    .hero {
      width: min(94vw, 620px);
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-rows: auto auto;
      gap: 4px 18px;
      align-items: center;
      margin-bottom: 28px;
      animation: rise 0.7s var(--ease) both;
    }

    /* 拟声词爆点「咚！」—— 漫画扉页字 */
    .sfx {
      grid-column: 1;
      grid-row: 1 / 3;
      align-self: center;
      font-weight: 900;
      font-size: clamp(46px, 13vw, 86px);
      line-height: 0.85;
      letter-spacing: -0.03em;
      color: var(--paper);
      -webkit-text-stroke: 3px var(--ink);
      text-shadow:
        4px 4px 0 var(--purple),
        8px 8px 0 var(--purple-bright),
        0 0 30px rgba(124, 58, 237, 0.6);
      transform: rotate(-8deg);
      white-space: nowrap;
    }

    /* 粗黑描边分镜框 */
    .name-box {
      grid-column: 2;
      grid-row: 1 / 3;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-radius: 16px;
      background: rgba(22, 19, 31, 0.62);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 2.5px solid var(--paper);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.55), 5px 5px 0 var(--purple);
    }

    .logo {
      width: 60px;
      height: 60px;
      flex-shrink: 0;
      border-radius: 14px;
      object-fit: cover;
      background: linear-gradient(135deg, var(--purple), var(--purple-bright));
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .name-text { min-width: 0; }

    .name {
      font-size: clamp(22px, 5.5vw, 30px);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.1;
      background: linear-gradient(135deg, var(--paper), var(--purple-bright));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .slogan {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-mute);
      margin-top: 3px;
    }

    /* ==================== 数据条 ==================== */
    .stats {
      display: flex;
      gap: 0;
      width: min(94vw, 620px);
      margin-bottom: 26px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(167, 139, 250, 0.3);
      background: rgba(22, 19, 31, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      animation: rise 0.7s var(--ease) 0.1s both;
    }

    .stat {
      flex: 1;
      padding: 14px 8px;
      text-align: center;
      border-right: 1px dashed rgba(167, 139, 250, 0.25);
    }
    .stat:last-child { border-right: none; }

    .stat-num {
      font-size: clamp(20px, 5vw, 26px);
      font-weight: 900;
      color: var(--purple-bright);
      line-height: 1;
    }
    .stat-num small { font-size: 0.55em; font-weight: 700; opacity: 0.8; }

    .stat-label {
      font-size: 11px;
      letter-spacing: 0.05em;
      color: var(--text-mute);
      margin-top: 6px;
    }

    /* ==================== 下载按钮组 ==================== */
    .downloads {
      display: flex;
      gap: 14px;
      width: min(94vw, 620px);
      margin-bottom: 30px;
      animation: rise 0.7s var(--ease) 0.2s both;
    }

    .dl-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 15px 14px;
      border-radius: 15px;
      cursor: pointer;
      font-weight: 800;
      font-size: 15px;
      text-decoration: none;
      border: 2px solid transparent;
      transition: transform 0.18s var(--ease), box-shadow 0.18s var(--ease);
    }
    .dl-btn img { width: 24px; height: 24px; flex-shrink: 0; }

    .dl-android {
      color: var(--paper);
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.45);
    }
    .dl-android:hover, .dl-android:focus-visible {
      transform: translateY(-3px);
      box-shadow: 0 14px 32px rgba(124, 58, 237, 0.6);
      outline: none;
    }

    .dl-ios {
      color: var(--paper);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }
    .dl-ios:hover, .dl-ios:focus-visible {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.14);
      outline: none;
    }

    /* ==================== 贴墙滚动好漫带 ==================== */
    .ticker {
      position: relative;
      width: 100%;
      overflow: hidden;
      padding: 10px 0 16px;
      mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
      -webkit-mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
    }

    .ticker-label {
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.2em;
      color: var(--text-mute);
      margin-bottom: 12px;
      font-weight: 600;
    }

    .ticker-track {
      display: flex;
      gap: 12px;
      width: max-content;
      animation: scroll 26s linear infinite;
    }

    .ticker-track:hover { animation-play-state: paused; }

    .ticker-item {
      width: 92px;
      height: 124px;
      flex-shrink: 0;
      border-radius: 10px;
      background-size: cover;
      background-position: center;
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
    }

    @keyframes scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ==================== 底部二维码 ==================== */
    .qr-section {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 8px 0 28px;
      padding: 14px 18px;
      border-radius: 16px;
      background: rgba(22, 19, 31, 0.6);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(167, 139, 250, 0.25);
      animation: rise 0.7s var(--ease) 0.3s both;
    }

    .qr-code {
      width: 86px;
      height: 86px;
      flex-shrink: 0;
      border-radius: 9px;
      overflow: hidden;
      background: #fff;
      padding: 4px;
    }
    .qr-code canvas { width: 100% !important; height: 100% !important; border-radius: 5px; }

    .qr-info { min-width: 0; }
    .qr-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .qr-tip {
      font-size: 11px;
      color: var(--text-mute);
      margin-top: 3px;
      max-width: 220px;
      word-break: break-all;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ==================== 响应式 ==================== */
    @media (max-width: 480px) {
      .wrap { padding-top: 5vh; }
      .hero { grid-template-columns: 1fr; gap: 12px; }
      .sfx { grid-column: 1; grid-row: 1; justify-self: start; }
      .name-box { grid-column: 1; grid-row: 2; }
      .stat { padding: 11px 6px; }
      .ticker-item { width: 76px; height: 102px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero, .stats, .downloads, .qr-section { animation: none; }
      .cover-layer { transition: none; }
      .ticker-track { animation: none; }
    }
  </style>
</head>
<body>
  <!-- 封面墙视差背景（三层景深，纯装饰） -->
  <div class="cover-wall" aria-hidden="true">
    <div class="cover-layer cover-layer--far"  data-depth="0.4"></div>
    <div class="cover-layer cover-layer--mid"  data-depth="1.0"></div>
    <div class="cover-layer cover-layer--near" data-depth="1.8"></div>
  </div>
  <div class="scrim" aria-hidden="true"></div>

  <main class="wrap">
    <!-- 拟声词 + 分镜框 logo/名称 -->
    <header class="hero">
      <div class="sfx" aria-hidden="true">咚！</div>
      <div class="name-box">
        <img class="logo" src="{{LOGO}}" alt="{{NAME}}图标" onerror="this.onerror=null;this.src='./image/logo.png'">
        <div class="name-text">
          <h1 class="name">{{NAME}}</h1>
          <p class="slogan">万部好漫 · 一触即达</p>
        </div>
      </div>
    </header>

    <!-- 数据条 -->
    <div class="stats">
      <div class="stat">
        <div class="stat-num">10<small>万+</small></div>
        <div class="stat-label">海量漫画</div>
      </div>
      <div class="stat">
        <div class="stat-num">4<small>K</small></div>
        <div class="stat-label">超清画质</div>
      </div>
      <div class="stat">
        <div class="stat-num">日<small>更</small></div>
        <div class="stat-label">每日更新</div>
      </div>
      <div class="stat">
        <div class="stat-num">∞</div>
        <div class="stat-label">离线畅读</div>
      </div>
    </div>

    <!-- 下载按钮 -->
    <div class="downloads">
      <a id="android-download-btn" class="dl-btn dl-android" href="javascript:void(0);" aria-label="安卓下载">
        <img src="./image/Group6.png" alt="安卓">
        <span>安卓下载</span>
      </a>
      <a id="ios-download-btn" class="dl-btn dl-ios" href="javascript:void(0);" aria-label="iOS下载">
        <img src="./image/Group7.png" alt="iOS">
        <span>iOS 下载</span>
      </a>
    </div>

    <!-- 贴墙滚动好漫带 -->
    <section class="ticker" aria-label="精选漫画">
      <div class="ticker-label">— 精 选 好 漫 —</div>
      <div class="ticker-track" id="ticker-track"></div>
    </section>

    <!-- 二维码 -->
    <div class="qr-section">
      <div class="qr-code" id="qrcode-container"></div>
      <div class="qr-info">
        <div class="qr-title">扫码下载</div>
        <div class="qr-tip">
          扫码即下 Android 版
          <span class="qr-link-preview" id="qr-link-preview"></span>
        </div>
      </div>
    </div>
  </main>

  <script>
  (function() {
    var covers = [
      "Rectangle8", "Rectangle21", "Rectangle22", "Rectangle23", "Rectangle24",
      "Rectangle25", "Rectangle27", "Rectangle29", "Rectangle30", "Rectangle31",
      "Rectangle32", "Rectangle33", "Rectangle36", "Rectangle37", "Rectangle38", "Rectangle39"
    ].map(function(n) { return "./image/slices/" + n + ".jpg"; });

    // 三层封面墙铺设
    function fillLayer(sel, count) {
      var layer = document.querySelector(sel);
      if (!layer) return;
      var html = "";
      for (var i = 0; i < count; i++) {
        html += '<div class="tile" style="background-image:url(' + covers[(i * 7 + count) % covers.length] + ')"></div>';
      }
      layer.innerHTML = html;
    }
    fillLayer(".cover-layer--far", 24);
    fillLayer(".cover-layer--mid", 18);
    fillLayer(".cover-layer--near", 12);

    // 滚动好漫带（复制一份实现无缝循环）
    var track = document.getElementById("ticker-track");
    if (track) {
      var tHtml = "";
      for (var i = 0; i < covers.length * 2; i++) {
        tHtml += '<div class="ticker-item" style="background-image:url(' + covers[i % covers.length] + ')"></div>';
      }
      track.innerHTML = tHtml;
    }

    // 鼠标跟随视差（reduced-motion 跳过）
    var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var layers = Array.prototype.slice.call(document.querySelectorAll(".cover-layer"));
    if (!reduceMotion && layers.length) {
      var raf = null;
      window.addEventListener("mousemove", function(e) {
        if (raf) return;
        raf = requestAnimationFrame(function() {
          raf = null;
          var dx = e.clientX / window.innerWidth - 0.5;
          var dy = e.clientY / window.innerHeight - 0.5;
          layers.forEach(function(layer) {
            var depth = parseFloat(layer.getAttribute("data-depth")) || 1;
            layer.style.transform = "translate3d(" + (-dx * depth * 26).toFixed(2) + "px," + (-dy * depth * 26).toFixed(2) + "px,0)";
          });
        });
      }, { passive: true });
    }

    // 下载链接
    var androidDownloadUrl = "{{DOWNLOAD_URL}}";
    var iosBtn = document.getElementById("ios-download-btn");
    var androidBtn = document.getElementById("android-download-btn");

    if (iosBtn) {
      iosBtn.addEventListener("click", function(event) {
        event.preventDefault();
        alert("iOS 版本开发中，敬请期待。");
      });
    }
    if (androidBtn) {
      androidBtn.setAttribute("href", androidDownloadUrl);
      androidBtn.setAttribute("target", "_blank");
      androidBtn.setAttribute("rel", "noopener noreferrer");
    }

    var previewSpan = document.getElementById("qr-link-preview");
    if (previewSpan) {
      var shortDisplay = androidDownloadUrl.length > 50 ? androidDownloadUrl.substring(0, 47) + "..." : androidDownloadUrl;
      previewSpan.innerHTML = "🔗 " + shortDisplay;
      previewSpan.style.fontSize = "10px";
      previewSpan.style.display = "inline-block";
      previewSpan.style.maxWidth = "240px";
      previewSpan.style.wordBreak = "break-all";
    }

    // 二维码
    var qrContainer = document.getElementById("qrcode-container");
    if (qrContainer) {
      var canvas = document.createElement("canvas");
      canvas.width = 120;
      canvas.height = 120;
      qrContainer.appendChild(canvas);

      var script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js';
      script.onload = function() {
        QRCode.toCanvas(canvas, androidDownloadUrl, {
          width: 120, margin: 1,
          color: { dark: "#000", light: "#fff" }
        }, function(err) { if (err) console.error("生成失败", err); });
      };
      document.head.appendChild(script);
    }
  })();
  </script>
</body>
</html>
