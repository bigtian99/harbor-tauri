    @font-face {
      font-family: "zihunjisuzhuijiti_T-Regular";

      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #0f0f14;
      --text: #f0f0f5;
      --primary: #7c3aed;
      --accent: #a78bfa;
      --card: #1a1a24;
      --border: #2a2a3a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      min-width: 1200px;
    }

    .container {
      container-type: inline-size;
      width: 100%;
    }

    /* Header */
    .header {
      width: 100%;
      height: 90px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 50%, rgba(124,58,237,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .header-title {
      font-size: 28px;
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 2px;
      position: relative;
      z-index: 1;
    }

    .header-title span {
      color: #ffffff;
    }

    /* Hero Section */
    .content {
      position: relative;
      isolation: isolate;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: calc(100vw * 854 / 1920);
      min-height: calc(100cqw * 854 / 1920);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .content::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background-color: #0f0f14;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(124,58,237,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(99,102,241,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .content > * {
      position: relative;
      z-index: 1;
    }

    .content .item {
      width: 30%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .content .item img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* App Icon */
    .content .item .icon {
      width: 160px;
      height: 160px;
      background: #D9D9D9;
      border-radius: 36px;
      margin: 0 auto;
      margin-top: 20px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .content .item .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .content .item .item-title {
      font-size: 24px;
      color: #ffffff;
      font-weight: 600;
      line-height: 30px;
      text-align: center;
      margin-top: 20px;
    }

    .content .item .item-content {
      font-size: 16px;
      color: rgba(255,255,255,0.75);
      font-weight: 400;
      line-height: 30px;
      text-align: center;
      max-width: 280px;
    }

    .content .item .item-button {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 20px;
      margin-bottom: 12px;
    }

    .content .item .item-button a {
      display: inline-block;
      flex: 0 0 auto;
      transition: transform 0.2s ease, opacity 0.2s;
    }

    .content .item .item-button a:hover {
      transform: scale(1.02);
      opacity: 0.92;
    }

    .content .item .item-button img {
      width: 160px;
      height: auto;
      display: block;
    }

    .content .item .item-button a.btn-android:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-2px);
    }

    /* QR Section */
    .qr-section {
      margin-top: 8px;
      margin-bottom: 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .qr-code {
      background: #ffffff;
      padding: 8px;
      border-radius: 20px;
      display: inline-flex;
      box-shadow: 0 8px 20px rgba(124,58,237,0.2);
      transition: all 0.2s;
    }

    .qr-code canvas {
      display: block;
      width: 120px;
      height: 120px;
      border-radius: 12px;
    }

    .qr-tip {
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      background: rgba(124,58,237,0.2);
      backdrop-filter: blur(4px);
      padding: 6px 16px;
      border-radius: 60px;
      font-weight: 400;
      letter-spacing: 0.5px;
      border: 1px solid rgba(124,58,237,0.3);
    }

    .qr-tip a {
      color: #a78bfa;
      text-decoration: none;
      font-weight: 500;
    }

    /* Product Intro Section */
    .product-intro {
      width: 100%;
      background: linear-gradient(180deg, #0f0f14 0%, #1a1a2e 100%);
      border-radius: 0;
      color: #ffffff;
      text-align: center;
    }

    .product-intro-title {
      padding-top: 50px;
      padding-bottom: 50px;
    }

    .product-intro-title-text {
      font-size: 40px;
      color: #ffffff;
      font-weight: 600;
      line-height: 50px;
      background: linear-gradient(135deg, #a78bfa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .product-intro-title-content {
      font-size: 18px;
      color: rgba(255,255,255,0.6);
      font-weight: 300;
      line-height: 30px;
      margin-top: 10px;
    }

    .product-intro-title-image {
      width: 60%;
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: clamp(16px, 3vw, 48px);
    }

    .product-intro-title-image-img {
      flex: 0 1 50%;
      max-width: 50%;
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      border-radius: 16px;
    }

    .product-intro-title-image-text {
      flex: 1 1 50%;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 20px;
      text-align: left;
      color: #ffffff;
      line-height: 1.4;
    }

    .product-intro-title-image-item {
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-rows: auto auto;
      column-gap: 14px;
      row-gap: 6px;
      width: 100%;
      align-items: start;
      background-color: rgba(124,58,237,0.08);
      border: 1px solid rgba(124,58,237,0.15);
      padding: 14px;
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .product-intro-title-image-item:hover {
      background-color: rgba(124,58,237,0.12);
      border-color: rgba(124,58,237,0.3);
    }

    .product-intro-title-image-index {
      grid-column: 1;
      grid-row: 1 / -1;
      align-self: center;
      justify-self: center;
      display: inline-block;
      color: #7c3aed;
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
      font-family: "zihunjisuzhuijiti_T-Regular", ui-sans-serif, sans-serif;
      transform: skewX(-10deg);
    }

    .product-intro-title-image-title {
      grid-column: 2;
      grid-row: 1;
      font-size: 22px;
      font-weight: 600;
      color: #ffffff;
      line-height: 1.35;
      min-width: 0;
    }

    .product-intro-title-image-desc {
      grid-column: 2;
      grid-row: 2;
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.5;
      min-width: 0;
    }

    /* Carousel Section */
    .product-carousel {
      width: 100%;
      background: linear-gradient(180deg, #1a1a2e 0%, #0f0f14 100%);
      border-radius: 0;
      color: #ffffff;
      text-align: center;
    }

    .product-carousel-title {
      padding-top: 50px;
      padding-bottom: 50px;
    }

    .product-carousel-title-text {
      font-size: 40px;
      color: #ffffff;
      font-weight: 600;
      line-height: 50px;
    }

    .product-carousel-title-content {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 12px 16px;
      margin-top: 16px;
      font-size: 14px;
      color: #ffffff;
      font-weight: 400;
      line-height: 1.3;
    }

    .product-carousel-title-content span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 14px;
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 60px;
      color: rgba(255,255,255,0.8);
    }

    /* Marquee */
    .product-carousel-marquee {
      width: 100%;
      overflow: hidden;
      padding: 8px 0 40px;
    }

    .product-carousel-marquee__row {
      overflow: hidden;
      width: 100%;
    }

    .product-carousel-marquee__row + .product-carousel-marquee__row {
      margin-top: 12px;
    }

    .product-carousel-marquee__track {
      display: flex;
      width: max-content;
      will-change: transform;
    }

    .product-carousel-marquee__row--ltr .product-carousel-marquee__track {
      animation: marquee-ltr 55s linear infinite;
    }

    .product-carousel-marquee__row--rtl .product-carousel-marquee__track {
      animation: marquee-rtl 55s linear infinite;
    }

    @keyframes marquee-ltr {
      from { transform: translateX(-50%); }
      to { transform: translateX(0); }
    }

    @keyframes marquee-rtl {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .product-carousel-marquee__group {
      display: flex;
      flex: 0 0 auto;
      align-items: stretch;
      gap: 10px;
      padding-right: 10px;
    }

    .product-carousel-marquee__group .marquee-card {
      flex: 0 0 auto;
      width: min(200px, 12.25vw);
      aspect-ratio: 1 / 1;
      background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(99,102,241,0.1));
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .product-carousel-marquee__group .marquee-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(124,58,237,0.1) 100%);
      pointer-events: none;
    }

    .product-carousel-marquee__group img {
      flex: 0 0 auto;
      width: min(200px, 12.25vw);
      aspect-ratio: 1 / 1;
      object-fit: cover;
      object-position: center;
      display: block;
      border-radius: 12px;
    }

    @media (prefers-reduced-motion: reduce) {
      .product-carousel-marquee__row--ltr .product-carousel-marquee__track,
      .product-carousel-marquee__row--rtl .product-carousel-marquee__track {
        animation: none;
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      body {
        min-width: 0;
      }

      .header {
        height: 56px;
      }

      .header-title {
        font-size: 20px;
      }

      .content {
        min-height: auto;
        display: flex;
        flex-direction: column;
        padding: 20px 16px;
      }

      .content::before {
        background-size: cover;
        background-position: center;
      }

      .content .item {
        width: 100%;
      }

      .content .item:first-child {
        order: 2;
      }

      .content .item:last-child {
        order: 1;
      }

      .content .item + .item {
        margin-top: 20px;
      }

      .content .item .icon {
        width: 100px;
        height: 100px;
        border-radius: 22px;
        margin-top: 0;
      }

      .content .item .item-title {
        margin-top: 12px;
        font-size: 20px;
        line-height: 1.3;
      }

      .content .item .item-content {
        margin-top: 8px;
        font-size: 14px;
        line-height: 1.6;
      }

      .content .item .item-button {
        margin-top: 14px;
        gap: 10px;
        flex-wrap: wrap;
      }

      .content .item .item-button img {
        width: 132px;
      }

      .qr-section {
        margin-top: 10px;
        margin-bottom: 16px;
      }

      .qr-code canvas {
        width: 100px;
        height: 100px;
      }

      .qr-tip {
        font-size: 11px;
      }

      .product-intro-title {
        padding: 32px 16px;
      }

      .product-intro-title-text {
        font-size: 28px;
        line-height: 1.25;
      }

      .product-intro-title-content {
        margin-top: 8px;
        font-size: 14px;
        line-height: 1.6;
      }

      .product-intro-title-image {
        width: 100%;
        margin-top: 16px;
        flex-direction: column;
        gap: 16px;
      }

      .product-intro-title-image-img {
        max-width: 100%;
      }

      .product-intro-title-image-text {
        width: 100%;
        gap: 12px;
      }

      .product-intro-title-image-item {
        padding: 10px 12px;
        column-gap: 10px;
      }

      .product-intro-title-image-index {
        font-size: 28px;
      }

      .product-intro-title-image-title {
        font-size: 17px;
      }

      .product-intro-title-image-desc {
        font-size: 13px;
      }

      .product-carousel-title {
        padding: 32px 16px 24px;
      }

      .product-carousel-title-text {
        font-size: 28px;
        line-height: 1.25;
      }

      .product-carousel-title-content {
        gap: 10px;
        font-size: 13px;
      }

      .product-carousel-title-content span {
        padding: 4px 12px;
      }

      .product-carousel-marquee {
        padding: 8px 0 24px;
      }

      .product-carousel-marquee__row + .product-carousel-marquee__row {
        margin-top: 8px;
      }

      .product-carousel-marquee__row--ltr .product-carousel-marquee__track {
        animation-duration: 36s;
      }

      .product-carousel-marquee__row--rtl .product-carousel-marquee__track {
        animation-duration: 36s;
      }

      .product-carousel-marquee__group {
        gap: 8px;
        padding-right: 8px;
      }

      .product-carousel-marquee__group .marquee-card,
      .product-carousel-marquee__group img {
        width: 30vw;
        min-width: 104px;
        max-width: 132px;
        border-radius: 8px;
      }
    }
  </style>

    </div>
  </div>

  <script>
  (function() {
    // 安卓下载链接
    var androidDownloadUrl = "{{DOWNLOAD_URL}}";

    // 按钮交互
    var iosBtn = document.getElementById("ios-download-btn");
    var androidBtn = document.getElementById("android-download-btn");

    if (iosBtn) {
      iosBtn.addEventListener("click", function(event) {
        event.preventDefault();
        alert("iOS 版本开发中，敬请期待。");
      });
    }

    if (androidBtn) {
      androidBtn.setAttribute("href", androidDownloadUrl);
      androidBtn.setAttribute("target", "_blank");
      androidBtn.setAttribute("rel", "noopener noreferrer");
    }

    // 显示预览链接文本
    var previewSpan = document.getElementById("qr-link-preview");
    if (previewSpan) {
      let shortDisplay = androidDownloadUrl.length > 50 ? androidDownloadUrl.substring(0, 47) + "..." : androidDownloadUrl;
      previewSpan.innerHTML = "🔗 " + shortDisplay;
      previewSpan.style.fontSize = "10px";
      previewSpan.style.display = "inline-block";
      previewSpan.style.maxWidth = "240px";
      previewSpan.style.wordBreak = "break-all";
    }

    // ===================== 稳定可用二维码生成（无报错版）=====================
    var qrContainer = document.getElementById("qrcode-container");
    if (qrContainer) {
      // 先创建 canvas
      var canvas = document.createElement("canvas");
      canvas.width = 120;
      canvas.height = 120;
      qrContainer.appendChild(canvas);

      // 加载二维码库
      var script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js';
      script.onload = function() {
        QRCode.toCanvas(canvas, androidDownloadUrl, {
          width: 120,
          margin: 1,
          color: {
            dark: "#000",
            light: "#fff"
          }
        }, function(err) {
          if (err) console.error("生成失败", err);
        });
      };
      document.head.appendChild(script);
    }
  })();
</script>
</body>
</html>
