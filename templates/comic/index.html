    .content {
        position: relative;
        isolation: isolate;
        width: 100%;

    .content::before {

    }
    .content .item .icon {

        overflow: hidden;
        display: flex;
        align-items: center;

    .content .item .icon img {
        width: 100%;
        height: 100%;

    }
    .content .item .item-title {
        font-size: 24px;
        color: #ffffff;
        font-weight: 600;
        line-height: 30px;
        text-align: center;
        margin-top: 20px;
    }
    .content .item .item-content {
        font-size: 16px;
        color: #ffffff;
        font-weight: 400;
        line-height: 30px;
        text-align: center;
        max-width: 280px;

    .content .item .item-button {

    .qr-tip {

    .product-carousel-marquee__track {

        width: max-content;

    }
    .product-carousel-marquee__row--ltr .product-carousel-marquee__track {
        animation: product-carousel-marquee-ltr 55s linear infinite;
    }
    .product-carousel-marquee__row--rtl .product-carousel-marquee__track {
        animation: product-carousel-marquee-rtl 55s linear infinite;
    }
    @keyframes product-carousel-marquee-ltr {
        from {
            transform: translateX(-50%);
        }
        to {
            transform: translateX(0);
        }
    }
    @keyframes product-carousel-marquee-rtl {
        from {
            transform: translateX(0);

        to {
            transform: translateX(-50%);

  <script>
  (function() {
    // 安卓下载链接
    var androidDownloadUrl = "{{DOWNLOAD_URL}}";
    
    // 按钮交互
    var iosBtn = document.getElementById("ios-download-btn");
    var androidBtn = document.getElementById("android-download-btn");

    if (iosBtn) {
      iosBtn.addEventListener("click", function(event) {
        event.preventDefault();
        alert("iOS 版本开发中，敬请期待。");
      });
    }

    if (androidBtn) {
      androidBtn.setAttribute("href", androidDownloadUrl);
      androidBtn.setAttribute("target", "_blank");
      androidBtn.setAttribute("rel", "noopener noreferrer");
    }
    
    // 显示预览链接文本
    var previewSpan = document.getElementById("qr-link-preview");
    if (previewSpan) {
      let shortDisplay = androidDownloadUrl.length > 50 ? androidDownloadUrl.substring(0, 47) + "..." : androidDownloadUrl;
      previewSpan.innerHTML = "🔗 " + shortDisplay;
      previewSpan.style.fontSize = "10px";
      previewSpan.style.display = "inline-block";
      previewSpan.style.maxWidth = "240px";
      previewSpan.style.wordBreak = "break-all";
    }

    // ===================== 稳定可用二维码生成（无报错版）=====================
    var qrContainer = document.getElementById("qrcode-container");
    if (qrContainer) {
      // 先创建 canvas
      var canvas = document.createElement("canvas");
      canvas.width = 120;
      canvas.height = 120;
      qrContainer.appendChild(canvas);

      // 加载二维码库
      var script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js';
      script.onload = function() {
        QRCode.toCanvas(canvas, androidDownloadUrl, {
          width: 120,
          margin: 1,
          color: {
            dark: "#000",
            light: "#fff"
          }
        }, function(err) {
          if (err) console.error("生成失败", err);
        });
      };
      document.head.appendChild(script);
    }
  })();
</script>
